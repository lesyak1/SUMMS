codecov:
  require_ci_to_pass: yes

coverage:
  status:
    project:
      default:
        target: auto
        threshold: 1%
    patch:
      default:
        target: auto
        threshold: 1%

comment:
  layout: "header, reach, diff, flags, tree"
  behavior: default
  require_changes: false
  after_n_builds: 1
