on:
  push:
    branches:
      - main
      - dev
  pull_request:

permissions:
  pull-requests: write
  contents: read

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint --if-present

      - name: Run tests
        run: node src/tests/rentals.unitTests.mjs

      - name: Debug coverage files
        run: |
          ls -R
          find . -name "*.xml"
          find . -name "lcov.info"

  backend:
    name: Backend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint --if-present

      - name: Run tests with coverage
        run: npx --yes c8 --all --include "src/controllers/**" --exclude "src/tests/**" --exclude "src/routes/**" --exclude "src/middleware/**" --exclude "src/config/**" --reporter=lcov npm test

      - name: Debug coverage files
        run: |
          ls -R
          find . -name "*.xml"
          find . -name "lcov.info"

      - name: Upload backend coverage to Codecov
        if: ${{ hashFiles('backend/coverage/lcov.info') != '' }}
        uses: codecov/codecov-action@v5
        with:
          files: backend/coverage/lcov.info
          flags: backend
          name: backend-coverage
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
